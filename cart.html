<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
color:#111;
padding:18px;
}

header{
text-align:center;
font-size:1.3rem;
font-weight:700;
padding-bottom:18px;
border-bottom:1px solid #eee;
margin-bottom:18px;
position:relative;
}

.back{
position:absolute;
left:0;
top:0;
text-decoration:none;
color:#111;
font-size:14px;
padding-top:4px;
}

#cart{
display:flex;
flex-direction:column;
gap:14px;
}

/* ITEM CARD */
.item{
border:1px solid #eee;
border-radius:16px;
padding:14px;
background:#fff;
}

/* TOP ROW */
.top-row{
display:flex;
gap:12px;
align-items:center;
}

.thumb{
width:68px;
height:68px;
object-fit:contain;
background:#fff;
border-radius:12px;
flex-shrink:0;
}

.info{
flex:1;
}

.name{
font-size:0.95rem;
font-weight:700;
line-height:1.35;
margin-bottom:6px;
}

.meta{
font-size:0.88rem;
color:#666;
}

/* BOTTOM */
.bottom-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:14px;
gap:12px;
}

.qty-box{
display:flex;
align-items:center;
gap:8px;
}

.qty-btn{
width:30px;
height:30px;
border:none;
border-radius:8px;
background:#111;
color:#fff;
font-size:18px;
cursor:pointer;
}

.qty{
min-width:18px;
text-align:center;
font-weight:700;
}

.price{
font-weight:700;
font-size:1rem;
}

.remove{
margin-top:10px;
font-size:0.85rem;
color:#999;
cursor:pointer;
text-decoration:underline;
}

/* SUMMARY */
.summary{
margin-top:22px;
padding-top:18px;
border-top:1px solid #eee;
}

.total{
display:flex;
justify-content:space-between;
font-size:1.15rem;
font-weight:700;
margin-bottom:18px;
}

/* CHECKOUT BUTTON */
.checkout{
width:100%;
padding:15px;
border:1px solid #111;
background:#fff;
color:#111;
font-size:1rem;
font-weight:700;
border-radius:12px;
cursor:pointer;
}

/* EMPTY */
.empty{
text-align:center;
padding:50px 20px;
color:#666;
line-height:1.7;
}

.shop-btn{
display:inline-block;
margin-top:16px;
padding:12px 18px;
background:#111;
color:#fff;
text-decoration:none;
border-radius:10px;
font-size:14px;
}
</style>
</head>

<body>

<header>
<a href="index.html" class="back">← Back</a>
Your Cart
</header>

<div id="cart"></div>

<div class="summary" id="summary">
<div class="total">
<span>Total</span>
<span id="total">₹0</span>
</div>

<button class="checkout" onclick="checkout()">
Proceed to Checkout on WhatsApp
</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* IMAGE MAPPING */
const productImages = {
"Ferrari 2025 Drivers Polo Jersey":"assets/products/ferrari_polo_2025.jpg",
"Ferrari Monza Edition":"assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg",
"Ferrari Swartwell Oversized Drivers Tee":"assets/products/ferrari_oversized.jpg"
};

function renderCart(){

let container = document.getElementById("cart");
let total = 0;

container.innerHTML = "";

if(cart.length === 0){

container.innerHTML = `
<div class="empty">
Your cart is empty.<br>
Start adding Ferrari heat 🔥<br>
<a href="collections.html" class="shop-btn">Shop Now</a>
</div>
`;

document.getElementById("summary").style.display = "none";
return;
}

document.getElementById("summary").style.display = "block";

cart.forEach((item,index)=>{

total += item.price * item.qty;

let img = productImages[item.name] || "";

container.innerHTML += `
<div class="item">

<div class="top-row">

<img src="${img}" class="thumb">

<div class="info">
<div class="name">${item.name}</div>
<div class="meta">Fit: ${item.fit}</div>
</div>

</div>

<div class="bottom-row">

<div class="qty-box">
<button class="qty-btn" onclick="changeQty(${index},-1)">−</button>
<div class="qty">${item.qty}</div>
<button class="qty-btn" onclick="changeQty(${index},1)">+</button>
</div>

<div class="price">₹${item.price * item.qty}</div>

</div>

<div class="remove" onclick="removeItem(${index})">Remove</div>

</div>
`;

});

document.getElementById("total").innerText = "₹" + total;

}

function changeQty(index,change){

cart[index].qty += change;

if(cart[index].qty <= 0){
cart.splice(index,1);
}

saveCart();
renderCart();
}

function removeItem(index){
cart.splice(index,1);
saveCart();
renderCart();
}

function saveCart(){
localStorage.setItem("cart", JSON.stringify(cart));
}

function checkout(){

let phone = "919961365304";
let total = 0;
let message = "🛒 Order Details:%0A%0A";

cart.forEach(item=>{

total += item.price * item.qty;

message +=
`Product: ${item.name}%0A` +
`Fit: ${item.fit}%0A` +
`Qty: ${item.qty}%0A` +
`Subtotal: ₹${item.price * item.qty}%0A%0A`;

});

message += `TOTAL: ₹${total}`;

window.open(`https://wa.me/${phone}?text=${message}`,"_blank");

}

renderCart();
</script>

</body>
</html>
