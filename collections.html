<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#fff;
    overflow-x:hidden;
}

/* HEADER */
header{
    position:relative;
    padding:16px;
    text-align:center;
    font-weight:700;
    font-size:1.4rem;
    text-transform:lowercase;
}

/* BACK */
.back{
    position:absolute;
    left:16px;
    top:16px;
    text-decoration:none;
    font-size:1rem;
    color:#000;
}

/* PAGE WRAP */
.grid{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:35px;
    padding:20px 0;
}

/* PRODUCT BLOCK */
.product{
    width:92vw;
    max-width:340px;
    text-align:center;
}

/* IMAGE ROW (NO SLIDER) */
.image-row{
    display:flex;
    gap:10px;
}

/* IMAGES */
.image-row img{
    width:50%;
    height:180px;
    object-fit:contain;
    background:#fff;
}

/* TEXT */
.desc{
    margin-top:10px;
}

.desc h2{
    font-size:1rem;
    font-weight:700;
}

.desc p{
    font-size:0.85rem;
    color:#666;
    margin-top:3px;
}

.price{
    margin-top:6px;
    font-weight:700;
}

/* DESKTOP */
@media(min-width:768px){
    .product{
        max-width:360px;
    }

    .image-row img{
        height:200px;
    }
}

</style>
</head>

<body>

<header>
    <a href="index.html" class="back">← back</a>
    collections
</header>

<div class="grid">

    <!-- PRODUCT 1 -->
    <div class="product">
        <div class="image-row">
            <img src="assets/products/product1.jpg">
            <img src="assets/products/product2.jpg">
        </div>
        <div class="desc">
            <h2>Ferrari Jersey</h2>
            <p>2026 edition motorsport jersey</p>
            <div class="price">₹1,499</div>
        </div>
    </div>

    <!-- PRODUCT 2 -->
    <div class="product">
        <div class="image-row">
            <img src="assets/products/product1.jpg">
            <img src="assets/products/product2.jpg">
        </div>
        <div class="desc">
            <h2>Red Bull Jersey</h2>
            <p>Street racing inspired edition</p>
            <div class="price">₹1,299</div>
        </div>
    </div>

    <!-- PRODUCT 3 -->
    <div class="product">
        <div class="image-row">
            <img src="assets/products/product1.jpg">
            <img src="assets/products/product2.jpg">
        </div>
        <div class="desc">
            <h2>Mercedes Jersey</h2>
            <p>Elite performance racing kit</p>
            <div class="price">₹1,599</div>
        </div>
    </div>

</div>

</body>
</html>
