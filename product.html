<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
body{font-family:Montserrat;background:#fff;color:#111;margin:0;padding:0;}
.container{max-width:420px;margin:auto;padding:18px;}

.gallery{overflow:hidden;border-radius:14px;}
.slides{display:flex;transition:0.6s cubic-bezier(0.22,1,0.36,1);}
.slides img{width:100%;height:420px;object-fit:cover;flex-shrink:0;}

.dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
.dot.active{background:#111;}

h1{text-align:center;font-size:1rem;margin-top:16px;}
.price{text-align:center;font-weight:700;margin-top:8px;}
.desc{text-align:center;color:#666;font-size:0.9rem;margin-top:10px;}

.size-box{padding:12px;border:1px solid #ddd;border-radius:10px;text-align:center;cursor:pointer;flex:1;}
.size-box.active{background:#111;color:#fff;}
.size-box.disabled{opacity:0.4;pointer-events:none;}

.size-row{display:flex;gap:10px;margin-top:12px;}

.btn{
width:100%;
padding:14px;
margin-top:18px;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.primary{background:#111;color:#fff;border:none;}
.secondary{background:#fff;border:1px solid #111;color:#111;}

.note{font-size:0.8rem;color:#666;margin-top:10px;text-align:center;}

header{text-align:center;padding:16px;border-bottom:1px solid #eee;}
.logo{width:160px;}
</style>
</head>

<body>

<header>
<img src="assets/logo.png" class="logo">
</header>

<div class="container">

<div class="gallery">
<div class="slides" id="slides"></div>
</div>

<div class="dots" id="dots"></div>

<h1 id="name"></h1>
<div class="price" id="price"></div>
<div class="desc" id="desc"></div>

<!-- LIVE PRODUCT UI -->
<div id="liveUI">

<div class="size-row">
<div class="size-box disabled">S</div>
<div class="size-box disabled">M</div>
<div class="size-box" onclick="selectSize(this,'L')">L</div>
<div class="size-box" onclick="selectSize(this,'XL')">XL</div>
</div>

<div class="note">Runs slightly larger than standard sizing.</div>

<button class="btn primary" id="cartBtn" onclick="addToCart()">Add to Cart</button>

</div>

<!-- COMING SOON UI -->
<div id="comingUI" style="display:none;">
<button class="btn secondary" onclick="enquiry()">Send Enquiry</button>
<div class="note">Coming soon. Tap to get updates on Instagram.</div>
</div>

</div>

<script>

const products={
polo:{
id:"polo",
name:"Ferrari 2025 Drivers Wear",
price:469,
desc:"Race inspired jersey built for everyday wear.",
images:[
"assets/products/ferrari-front.jpg",
"assets/products/ferrari-back.jpg"
],
live:true
},

monza:{
id:"monza",
name:"Ferrari Monza Edition",
price:0,
desc:"Limited edition drop coming soon.",
images:[
"assets/products/ferrari-monza.jpg"
],
live:false
}
};

const params=new URLSearchParams(window.location.search);
const id=params.get("id")||"polo";
const product=products[id];

/* TEXT */
document.getElementById("name").innerText=product.name;
document.getElementById("price").innerText=product.live?"₹"+product.price:"Coming Soon";
document.getElementById("desc").innerText=product.desc;

/* UI SWITCH */
if(product.live){
document.getElementById("liveUI").style.display="block";
document.getElementById("comingUI").style.display="none";
}else{
document.getElementById("liveUI").style.display="none";
document.getElementById("comingUI").style.display="block";
}

/* SLIDER */
const slides=document.getElementById("slides");
const dots=document.getElementById("dots");

product.images.forEach((img,i)=>{
slides.innerHTML+=`<img src="${img}">`;
dots.innerHTML+=`<div class="dot ${i===0?'active':''}" onclick="go(${i})"></div>`;
});

let current=0;

function go(i){
current=i;
if(current>=product.images.length) current=0;
if(current<0) current=product.images.length-1;
slides.style.transform=`translateX(-${current*100}%)`;

document.querySelectorAll(".dot").forEach((d,i)=>{
d.classList.toggle("active",i===current);
});
}

/* SIZE */
let size="";

function selectSize(el,s){
document.querySelectorAll(".size-box").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
size=s;
}

/* CART */
function addToCart(){

if(!size){
alert("Select size");
return;
}

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let found=cart.find(i=>i.id===product.id && i.size===size);

if(found) found.qty++;
else cart.push({id:product.id,name:product.name,price:product.price,size,qty:1,img:product.images[0]});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added");
}

/* ENQUIRY */
function enquiry(){

let msg=`🛒 ENQUIRY - rev per min.%0A%0AProduct: ${product.name}`;

navigator.clipboard.writeText(decodeURIComponent(msg));

window.open("https://ig.me/m/revolutions.perminute","_blank");

alert("Copied to clipboard");
}

</script>

</body>
</html>
