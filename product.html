<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product | rev per min.®</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#fff;color:#111;}

header{
position:relative;
padding:18px;
display:flex;
justify-content:center;
align-items:center;
border-bottom:1px solid #eee;
}

.back{
position:absolute;
left:18px;
top:24px;
text-decoration:none;
color:#111;
font-weight:700;
}

.logo{width:160px;max-width:58vw;}

.cart-wrap{
position:absolute;
right:18px;
top:22px;
font-size:22px;
text-decoration:none;
color:#111;
}

.cart-count{
position:absolute;
top:-6px;
right:-10px;
background:#000;
color:#fff;
font-size:10px;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.cart-count.hide{display:none;}

.container{max-width:420px;margin:auto;padding:18px;}

.gallery{overflow:hidden;border-radius:16px;}
.slides{
display:flex;
transition:transform 0.65s cubic-bezier(0.22,1,0.36,1);
}
.slides img{
width:100%;
height:420px;
object-fit:cover;
flex-shrink:0;
}

.dots{
display:flex;
justify-content:center;
gap:8px;
margin-top:10px;
}
.dot{
width:7px;height:7px;border-radius:50%;background:#ccc;
}
.dot.active{background:#111;transform:scale(1.2);}

h1{text-align:center;font-size:1.05rem;margin-top:16px;}
.price{text-align:center;font-weight:700;font-size:1.3rem;margin-top:8px;}
.desc{text-align:center;color:#666;margin-top:10px;font-size:0.9rem;line-height:1.5;}

.label{margin-top:20px;font-weight:700;}

.size-grid{
display:flex;
gap:10px;
margin-top:10px;
}

.size-box{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
text-align:center;
font-weight:700;
cursor:pointer;
}

.size-box.active{
background:#111;
color:#fff;
border-color:#111;
}

.size-box.disabled{
opacity:0.4;
pointer-events:none;
}

.note{
font-size:0.8rem;
color:#666;
margin-top:10px;
}

.btn{
width:100%;
padding:14px;
margin-top:18px;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

.primary{background:#111;color:#fff;}
.secondary{background:#fff;border:1px solid #111;color:#111;}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#111;
color:#fff;
padding:10px 14px;
border-radius:8px;
font-size:0.85rem;
opacity:0;
transition:0.3s;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<header>
<a href="collections.html" class="back">←</a>
<img src="assets/logo.png" class="logo">
<a href="cart.html" class="cart-wrap">🛒<span class="cart-count hide" id="cartCount">0</span></a>
</header>

<div class="container">

<div class="gallery">
<div class="slides" id="slides"></div>
</div>

<div class="dots" id="dots"></div>

<h1 id="name"></h1>
<div class="price" id="price"></div>
<div class="desc" id="desc"></div>

<div class="label">Select Size</div>

<div class="size-grid">
<div class="size-box disabled">S</div>
<div class="size-box disabled">M</div>
<div class="size-box" onclick="selectSize(this,'L')">L</div>
<div class="size-box" onclick="selectSize(this,'XL')">XL</div>
</div>

<div class="note">Runs slightly larger than standard sizing.</div>

<button class="btn primary" id="cartBtn" onclick="addToCart()">Add to Cart</button>
<button class="btn secondary" id="enquiryBtn">Send Enquiry</button>

</div>

<div class="toast" id="toast"></div>

<script>

const product={
id:"ferrari_2025",
name:"Ferrari 2025 Drivers Jersey",
price:469,
images:["assets/products/ferrari-front.jpg","assets/products/ferrari-back.jpg"],
live:true
};

/* slider */
let current=0;
const slides=document.getElementById("slides");
const dots=document.getElementById("dots");

product.images.forEach((img,i)=>{
slides.innerHTML+=`<img src="${img}">`;
dots.innerHTML+=`<div class="dot ${i===0?'active':''}" onclick="go(${i})"></div>`;
});

function go(i){
current=i;
if(current>=product.images.length) current=0;
if(current<0) current=product.images.length-1;
slides.style.transform=`translateX(-${current*100}%)`;
document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("active",i===current));
}

/* swipe */
let startX=0;
slides.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
slides.addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(endX<startX-40) go(current+1);
if(endX>startX+40) go(current-1);
});

/* size */
let size="";
function selectSize(el,s){
document.querySelectorAll(".size-box").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
size=s;
}

/* cart */
function addToCart(){

if(!size) return showToast("Select size first");

let cart=JSON.parse(localStorage.getItem("cart"))||[];

let found=cart.find(i=>i.id===product.id && i.size===size);

if(found) found.qty++;
else cart.push({id:product.id,name:product.name,price:product.price,size,qty:1,img:product.images[0]});

localStorage.setItem("cart",JSON.stringify(cart));

showToast("Added to cart");
updateCart();
}

/* enquiry */
document.getElementById("enquiryBtn").onclick=function(){

let msg=`🛒 ENQUIRY - rev per min.%0A%0AProduct: ${product.name}%0APrice: ₹${product.price}`;

navigator.clipboard.writeText(decodeURIComponent(msg));

window.open("https://ig.me/m/revolutions.perminute","_blank");

showToast("Enquiry copied");
};

/* cart */
function updateCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let t=cart.reduce((a,b)=>a+b.qty,0);
let badge=document.getElementById("cartCount");
badge.innerText=t;
badge.classList.toggle("hide",t===0);
}
updateCart();

/* toast */
function showToast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

</script>

</body>
</html>
