<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#fff;
    font-family:'Montserrat',sans-serif;
    color:#000;
    overflow-x:hidden;
}

header{
    width:100%;
    padding:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    border-bottom:1px solid #eee;
}

.back{
    position:absolute;
    left:18px;
    top:18px;
    text-decoration:none;
    color:#000;
    font-size:1rem;
}

.brand{
    font-size:1.2rem;
    font-weight:700;
    text-transform:lowercase;
}

.container{
    width:100%;
    max-width:420px;
    margin:auto;
    padding:20px;
    text-align:center;
}

.product-image{
    width:100%;
    height:340px;
    object-fit:contain;
    background:#fff;
}

h1{
    margin-top:18px;
    font-size:1.2rem;
    line-height:1.4;
}

.fit{
    margin-top:8px;
    color:#666;
    font-size:0.95rem;
}

.price{
    margin-top:14px;
    font-size:1.5rem;
    font-weight:700;
}

.desc{
    margin-top:14px;
    font-size:0.95rem;
    color:#555;
    line-height:1.6;
}

button{
    width:100%;
    margin-top:24px;
    padding:14px;
    border:none;
    background:#000;
    color:#fff;
    font-size:1rem;
    border-radius:10px;
    cursor:pointer;
}

button:active{
    transform:scale(0.98);
}

.notice{
    margin-top:14px;
    font-size:0.85rem;
    color:green;
    display:none;
}
</style>
</head>

<body>

<header>
    <a href="collections.html" class="back">← back</a>
    <div class="brand">rev per min.</div>
</header>

<div class="container">

    <img id="productImage" class="product-image">

    <h1 id="productName"></h1>

    <div id="productFit" class="fit"></div>

    <div id="productPrice" class="price"></div>

    <div id="productDesc" class="desc"></div>

    <button onclick="addToCart()">Add to Cart</button>

    <div class="notice" id="notice">Added to cart ✓</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const products = {

polo:{
name:"Ferrari 2025 Drivers Polo Jersey",
price:1499,
fit:"Normal Fit",
img:"assets/ferrari-polo.jpg",
desc:"Premium Ferrari inspired polo jersey built for everyday wear and motorsport fans."
},

monza:{
name:"Ferrari Monza Edition",
price:1599,
fit:"Normal Fit",
img:"assets/ferrari-monza.jpg",
desc:"Special Monza edition jersey inspired by iconic Ferrari race heritage."
},

swartwell:{
name:"Ferrari Swartwell Oversized Drivers T-Shirt",
price:1299,
fit:"Oversized Fit",
img:"assets/ferrari-swartwell.jpg",
desc:"Relaxed oversized streetwear fit blended with Ferrari racing culture."
}

};

const product = products[id] || products.polo;

document.getElementById("productImage").src = product.img;
document.getElementById("productName").innerText = product.name;
document.getElementById("productFit").innerText = product.fit;
document.getElementById("productPrice").innerText = "₹" + product.price;
document.getElementById("productDesc").innerText = product.desc;

function addToCart(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === product.name);

if(existing){
    existing.qty += 1;
}else{
    cart.push({
        name:product.name,
        price:product.price,
        fit:product.fit,
        qty:1
    });
}

localStorage.setItem("cart", JSON.stringify(cart));

document.getElementById("notice").style.display = "block";

setTimeout(()=>{
document.getElementById("notice").style.display = "none";
},1500);

}
</script>

</body>
</html>
