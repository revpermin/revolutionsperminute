<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#fff;
color:#111;
}

header{
padding:18px;
text-align:center;
font-weight:700;
font-size:1.1rem;
border-bottom:1px solid #eee;
position:relative;
}

.back{
position:absolute;
left:18px;
top:18px;
text-decoration:none;
color:#111;
font-size:14px;
}

.container{
max-width:420px;
margin:auto;
padding:22px;
text-align:center;
}

.product-image{
width:100%;
height:340px;
object-fit:contain;
}

h1{
font-size:1.2rem;
margin-top:18px;
line-height:1.4;
}

.price{
font-size:1.5rem;
font-weight:700;
margin-top:12px;
}

.desc{
font-size:0.92rem;
color:#666;
line-height:1.6;
margin-top:12px;
}

.label{
margin-top:24px;
font-size:0.9rem;
font-weight:700;
text-align:left;
}

.sizes{
display:flex;
gap:10px;
margin-top:12px;
}

.size-btn{
flex:1;
padding:12px;
border:1px solid #ddd;
background:#fff;
border-radius:10px;
cursor:pointer;
font-size:0.95rem;
}

.size-btn.active{
border:1px solid #000;
background:#000;
color:#fff;
}

button{
width:100%;
padding:15px;
margin-top:24px;
border:none;
background:#000;
color:#fff;
font-size:1rem;
border-radius:12px;
cursor:pointer;
}

.notice{
margin-top:14px;
font-size:14px;
color:green;
display:none;
}
</style>
</head>

<body>

<header>
<a href="collections.html" class="back">← Back</a>
rev per min.
</header>

<div class="container">

<img id="productImage" class="product-image">

<h1 id="productName"></h1>

<div class="price" id="productPrice"></div>

<div class="desc" id="productDesc"></div>

<div class="label">Select Size</div>

<div class="sizes">
<div class="size-btn" onclick="pickSize(this,'S')">S</div>
<div class="size-btn" onclick="pickSize(this,'M')">M</div>
<div class="size-btn" onclick="pickSize(this,'L')">L</div>
<div class="size-btn" onclick="pickSize(this,'XL')">XL</div>
</div>

<button onclick="addToCart()">Add to Cart</button>

<div class="notice" id="notice">Added to cart ✓</div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const products = {

polo:{
name:"Ferrari 2025 Drivers Polo Jersey",
price:1499,
img:"assets/products/ferrari_polo_2025.jpg",
desc:"Premium Ferrari inspired jersey crafted for everyday comfort and race-day style."
},

monza:{
name:"Ferrari Monza Edition",
price:1599,
img:"assets/products/ferrari-puma-monza-2025-special-edition-t-shirt.jpg",
desc:"Special Monza edition built from iconic Ferrari racing heritage."
},

swartwell:{
name:"Ferrari Oversized Drivers Tee",
price:1299,
img:"assets/products/ferrari_oversized.jpg",
desc:"Oversized motorsport streetwear fit for casual premium style."
}

};

const product = products[id] || products.polo;

document.getElementById("productImage").src = product.img;
document.getElementById("productName").innerText = product.name;
document.getElementById("productPrice").innerText = "₹" + product.price;
document.getElementById("productDesc").innerText = product.desc;

let selectedSize = "";

function pickSize(el,size){

document.querySelectorAll(".size-btn").forEach(btn=>{
btn.classList.remove("active");
});

el.classList.add("active");
selectedSize = size;
}

function addToCart(){

if(selectedSize===""){
alert("Please select a size");
return;
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:product.name,
price:product.price,
size:selectedSize,
qty:1
});

localStorage.setItem("cart", JSON.stringify(cart));

document.getElementById("notice").style.display="block";

setTimeout(()=>{
document.getElementById("notice").style.display="none";
},1500);

}
</script>

</body>
</html>
