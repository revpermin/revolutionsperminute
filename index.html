<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolutions Per Minute</title>

<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    overflow:hidden;
    height:100vh;
    width:100%;
    font-family:'Titillium Web',sans-serif;
}

/* CENTER BRAND NAME */
.brand{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:5rem;
    font-weight:900;
    color:#d10000;
    letter-spacing:2px;
    text-transform:uppercase;
    white-space:nowrap;
    z-index:5;
}

/* CAR */
.car{
    position:absolute;
    bottom:8%;
    left:-40%;
    width:420px;
    z-index:4;
    animation:run 0.75s linear forwards;
    animation-delay:0.5s;
}

/* SMOKE */
.smoke{
    position:absolute;
    bottom:10%;
    left:-30%;
    width:260px;
    height:90px;
    border-radius:50%;
    background:rgba(180,180,180,0.35);
    filter:blur(25px);
    animation:smoke 1s linear forwards;
    animation-delay:0.5s;
    z-index:1;
}

/* CAR MOVEMENT */
@keyframes run{
    0%{
        left:-45%;
        opacity:1;
    }
    100%{
        left:120%;
        opacity:0;
    }
}

/* SMOKE MOVEMENT */
@keyframes smoke{
    0%{
        left:-30%;
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        left:90%;
        opacity:0;
    }
}

/* MOBILE */
@media(max-width:768px){
.brand{
    font-size:2.4rem;
    text-align:center;
    width:90%;
    white-space:normal;
}

.car{
    width:260px;
    bottom:7%;
}

.smoke{
    width:180px;
}
}
</style>
</head>

<body>

<div class="brand">Revolutions Per Minute</div>

<img src="car.png" class="car">
<div class="smoke"></div>

</body>
</html>
