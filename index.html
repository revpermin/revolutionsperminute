<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat',sans-serif;
    background:#fff;
}

/* HEADER */
header{
    text-align:center;
    padding:18px;
    font-weight:700;
    text-transform:lowercase;
}

/* TOP BUTTONS (UNCHANGED AS REQUESTED) */
.top-buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:10px;
}

.top-buttons button{
    padding:10px 18px;
    border:none;
    background:#000;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

/* ===== PRODUCT SLIDER SECTION ===== */
.slider{
    width:100%;
    max-width:360px;
    margin:25px auto;
    overflow:hidden;
    border-radius:16px;
}

.slider-track{
    display:flex;
    width:200%;
    transition:0.5s ease;
}

/* PRODUCT CARD */
.product{
    width:100%;
    flex-shrink:0;
    background:#f4f4f4;
    padding:15px;
    text-align:center;
}

/* IMAGE */
.product img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
}

/* TEXT */
.product h2{
    margin-top:10px;
    font-size:1.2rem;
}

.product p{
    font-size:0.9rem;
    color:#555;
    margin-top:5px;
}

.price{
    margin-top:8px;
    font-weight:700;
    font-size:1.1rem;
}

/* DOTS */
.dots{
    text-align:center;
    margin-top:10px;
}

.dot{
    height:8px;
    width:8px;
    margin:0 4px;
    display:inline-block;
    background:#bbb;
    border-radius:50%;
    cursor:pointer;
}

.dot.active{
    background:#000;
}
</style>
</head>

<body>

<header>
    rev per min.
</header>

<!-- 🔒 YOUR EXISTING BUTTONS (UNCHANGED) -->
<div class="top-buttons">
    <button>Home</button>
    <button>Collections</button>
</div>

<!-- 🚀 PRODUCT SLIDER (NEW) -->
<div class="slider">
    <div class="slider-track" id="track">

        <!-- PRODUCT 1 -->
        <div class="product">
            <img src="assets/products/product1.jpg">
            <h2>Ferrari Race Jersey</h2>
            <p>Premium motorsport inspired jersey</p>
            <div class="price">₹1,499</div>
        </div>

        <!-- PRODUCT 2 -->
        <div class="product">
            <img src="assets/products/product2.jpg">
            <h2>Red Bull Street Tee</h2>
            <p>Limited edition racing streetwear</p>
            <div class="price">₹1,299</div>
        </div>

    </div>
</div>

<!-- DOT NAV -->
<div class="dots">
    <span class="dot active" onclick="slide(0)"></span>
    <span class="dot" onclick="slide(1)"></span>
</div>

<script>
let track = document.getElementById("track");
let dots = document.querySelectorAll(".dot");

function slide(index){
    track.style.transform = `translateX(-${index * 100}%)`;

    dots.forEach(d => d.classList.remove("active"));
    dots[index].classList.add("active");
}

/* optional auto slide */
setInterval(()=>{
    let active = document.querySelector(".dot.active");
    let index = [...dots].indexOf(active);
    let next = (index + 1) % 2;
    slide(next);
}, 4000);
</script>

</body>
</html>
