<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rev per min.</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0b1220;
    font-family:'Montserrat',sans-serif;
    min-height:100vh;
    color:white;
    padding:20px;
}

/* BRAND */
.brand{
    text-align:center;
    margin-top:15px;
    font-size:1.6rem;
    font-weight:700;
    color:#ff2a2a;
    letter-spacing:1px;
    text-transform:lowercase;
}

/* BUTTON */
.collections-btn{
    display:block;
    width:100%;
    max-width:320px;
    margin:22px auto;
    background:#000;
    color:#fff;
    text-align:center;
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    font-size:1rem;
    font-weight:600;
    letter-spacing:1px;
}

/* SLIDESHOW */
.slider{
    width:100%;
    max-width:360px;
    height:420px;
    margin:0 auto;
    overflow:hidden;
    border-radius:18px;
    position:relative;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.slides{
    display:flex;
    width:300%;
    height:100%;
    animation:slide 12s infinite;
}

.slides img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* AUTO SLIDE */
@keyframes slide{
    0%,28%{
        transform:translateX(0%);
    }
    33%,61%{
        transform:translateX(-33.333%);
    }
    66%,94%{
        transform:translateX(-66.666%);
    }
    100%{
        transform:translateX(0%);
    }
}

/* MOBILE PERFECT */
@media(min-width:768px){

.brand{
    font-size:2rem;
}

.slider{
    max-width:420px;
    height:500px;
}

.collections-btn{
    max-width:360px;
}

}
</style>
</head>

<body>

<div class="brand">rev per min.</div>

<a href="#" class="collections-btn">collections</a>

<div class="slider">
    <div class="slides">
        <img src="slide1.jpg" alt="F1 update 1">
        <img src="slide2.jpg" alt="F1 update 2">
        <img src="slide3.jpg" alt="F1 update 3">
    </div>
</div>

</body>
</html>
