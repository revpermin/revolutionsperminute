<!-- collections.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>collections</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:'Montserrat',sans-serif;
    padding:20px;
    text-align:center;
}

.title{
    font-size:1.8rem;
    font-weight:700;
    margin-bottom:25px;
    text-transform:lowercase;
}

.product{
    max-width:360px;
    margin:auto;
}

.product img{
    width:100%;
    border-radius:16px;
}

.name{
    font-size:1.4rem;
    font-weight:700;
    margin-top:18px;
}

.price{
    font-size:1.6rem;
    color:#d10000;
    font-weight:700;
    margin-top:8px;
}

.desc{
    margin-top:10px;
    color:#444;
    font-size:1rem;
}

.buy{
    display:inline-block;
    margin-top:20px;
    background:#000;
    color:#fff;
    padding:14px 30px;
    border-radius:10px;
    text-decoration:none;
    font-weight:700;
}
</style>
</head>

<body>

<div class="title">collections</div>

<div class="product">
    <img src="product.jpg">
    <div class="name">Ferrari Jersey 2026</div>
    <div class="price">₹499</div>
    <div class="desc">premium fit | limited drop | motorsport edition</div>
    <a href="#" class="buy">buy now</a>
</div>

</body>
</html>
