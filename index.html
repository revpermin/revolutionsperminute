<style>
/* NEW PREMIUM SLIDER */
.slider-track{
width:300%;
height:100%;
display:flex;
cursor:pointer;
transition:transform 0.8s ease;
}

.slider-track img{
width:100%;
height:100%;
flex-shrink:0;
object-fit:cover;
}
</style>

<!-- KEEP HTML SAME -->
<div class="square">
<div class="slider-track" id="sliderTrack">
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
</div>
</div>

<script>
function toggleMenu(){
document.querySelector(".menu-btn").classList.toggle("active");
document.getElementById("menu").classList.toggle("active");
}

function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

cart.forEach(item=>{
total += item.qty;
});

const badge = document.getElementById("cartCount");
badge.innerText = total;

if(total===0){
badge.classList.add("hide");
}else{
badge.classList.remove("hide");
}
}

updateCartCount();

/* PREMIUM HALF SLIDE SYSTEM */
const slider = document.getElementById("sliderTrack");

/*
0 = full img1
1 = half img2
2 = full img2
3 = half img3
4 = full img3
5 = half img1 return
*/

const positions = [
0,
-50,
-100,
-150,
-200,
-250
];

let current = 0;

function moveSlider(){
slider.style.transform = `translateX(${positions[current]}%)`;
}

function nextSlide(){
current++;

if(current >= positions.length){
current = 0;
}

moveSlider();
}

/* auto movement */
setInterval(nextSlide,2200);

/* manual click */
slider.addEventListener("click",()=>{
nextSlide();
});
</script>
